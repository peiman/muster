name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly heartbeat (Mon 06:00 UTC): catches a new RUSTSEC advisory against a
    # frozen Cargo.lock even with zero commits — the RUSTSEC-2026-0104 failure
    # mode. Only the lightweight `advisories` job runs on schedule.
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Least-privilege default: jobs that need more declare it explicitly.
permissions:
  contents: read

# Cancel in-flight runs for the same branch/PR. Include event_name in the group
# key so schedule/workflow_dispatch runs on refs/heads/main get a distinct
# group from push runs — a push must not cancel the weekly advisory heartbeat.
# cancel-in-progress is intentionally unconditional: a newer push to the same
# branch/event supersedes the old run in every case.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# Tool versions are PINNED, not floating: `cargo install <tool> --locked` only
# pins the tool's own dependencies, NOT the tool version, so a breaking release
# of just/cargo-deny/cargo-llvm-cov would otherwise break CI with no change
# here. Bumping these is a deliberate, reviewable edit. Most action SHAs are
# kept fresh by Dependabot (github-actions ecosystem, weekly schedule).
# Exception: dtolnay/rust-toolchain is used as a mutable semver tag (@1.96.0),
# not a pinned SHA — it is intentionally excluded from Dependabot auto-bumps
# because the version-sensitive trybuild snapshots must stay stable. See
# dependabot.yml for the rationale.

jobs:
  advisories:
    name: Security advisories
    # Idle-repo heartbeat for new advisories. On push/PR the same scan runs
    # inside `just check`, so this only adds the scheduled (and manual) cadence.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.8 --locked

      - name: Check advisories
        run: cargo deny check advisories

  unsafe-surface:
    name: Unsafe surface (advisory)
    # cargo-geiger reports the unsafe surface of the dependency tree. ADVISORY —
    # an unsafe count is a metric, not a gate, so (like the advisories heartbeat)
    # it runs only on the weekly schedule + manual dispatch, never blocking PRs,
    # and continue-on-error keeps it green even if cargo-geiger itself hiccups.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Install just
        run: cargo install just --version 1.52.0 --locked

      - name: Install cargo-geiger
        run: cargo install cargo-geiger --version 0.13.0 --locked

      - name: Report unsafe surface
        run: just ckeletin-geiger

  check:
    name: Check
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Pinned to match rust-toolchain.toml so trybuild snapshots stay stable.
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        run: cargo install just --version 1.52.0 --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.8 --locked

      # SSOT: `just check` is the single gateway.
      # Same checks run locally (lefthook + just) and in CI.
      # If you add a check, add it to Justfile — CI picks it up automatically.
      - name: Run all checks
        run: just check

  init-smoke:
    name: Scaffold init smoke
    # Upstream-only. This builds a fresh project from `just init` and asserts
    # the `ping` worked example survives — true for ckeletin-rust itself, but
    # not for derived projects (which replace ping). The guard keeps the job
    # from failing in downstream forks while still gating `just init` here.
    if: github.repository == 'peiman/ckeletin-rust' && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Pinned to match rust-toolchain.toml so trybuild snapshots stay stable.
      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-initsmoke-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        run: cargo install just --version 1.52.0 --locked

      # Builds a fresh scaffold from `just init` in a temp dir and runs its full
      # test suite — catches a non-compiling project AND a mangled test file
      # (cargo check alone compiles only lib + bin).
      - name: Run scaffold init smoke test
        run: just init-smoke

  coverage:
    name: Coverage (85% min)
    # CKSPEC-TEST-002: the 85% threshold must gate the pipeline. `just coverage`
    # is too heavy for the local `just check` loop, so it gates here in CI.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Pinned to match rust-toolchain.toml so trybuild snapshots stay stable.
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked

      - name: Install just
        run: cargo install just --version 1.52.0 --locked

      - name: Coverage (fails under 85%)
        run: just coverage

  conform:
    name: Conformance
    # CKSPEC-ENF-005/006/007: validate the conformance mapping covers every spec
    # requirement (against the committed vendored snapshot — hermetic, no
    # network), run each mapped check, and emit feedback signals.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Pinned to match rust-toolchain.toml so trybuild snapshots stay stable.
      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-conform-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        run: cargo install just --version 1.52.0 --locked

      - name: Conformance generator
        run: just conform

  secret-scan:
    name: Secret scan
    # Hard gate for hardcoded credentials. Uses the gitleaks CLI binary directly
    # (NOT gitleaks-action, which carries a commercial EULA for org-owned repos).
    # Pinned version, like the other CI tools — bump deliberately.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so `gitleaks git` scans every commit

      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks

      - name: Scan git history for secrets
        run: gitleaks git -v --redact --no-banner --config .ckeletin/configs/gitleaks.toml

  sbom:
    name: SBOM (generate + scan)
    # Supply-chain: emit a CycloneDX SBOM for the shipped binary's dependency
    # graph and scan it for known vulnerabilities (gates on High+). The SBOM is
    # uploaded as a build artifact for compliance/consumers.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Pinned to match rust-toolchain.toml so the dep graph resolves identically.
      - uses: dtolnay/rust-toolchain@1.96.0

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-sbom-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked

      - name: Install just
        run: cargo install just --version 1.52.0 --locked

      - name: Install grype
        run: |
          # Pinned release + checksum-verified — no piping from a moving branch.
          GRYPE_VERSION=0.114.0
          ARCHIVE="grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          curl -sSfL "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/${ARCHIVE}" \
            -o "/tmp/${ARCHIVE}"
          echo "edda0968d8827daab01d32b3cd7de192ae0915005e7bbfcfef9e68e79bc43343  /tmp/${ARCHIVE}" \
            | sha256sum --check --quiet
          tar -xz -C /usr/local/bin -f "/tmp/${ARCHIVE}" grype

      - name: Generate + scan SBOM (fails on High+)
        run: just ckeletin-sbom-scan

      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: warn
