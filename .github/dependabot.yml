version: 2

# Keeps pinned versions fresh via reviewable PRs instead of silent drift:
# - cargo: workspace dependencies + Cargo.lock (also surfaces advisory-driven
#   bumps), complementing the weekly `advisories` CI heartbeat.
# - github-actions: the `uses:` action refs in .github/workflows. Actions are
#   pinned to full commit SHAs with a trailing `# vX.Y.Z` comment; Dependabot
#   understands this pattern and proposes SHA-update PRs when a new tag is
#   published — so SHA pinning and auto-freshening coexist correctly.
# NOT covered by Dependabot (bumped by hand — deliberate, reviewable edits):
# - `cargo install <tool> --version X` pins in ci.yml: these are run-commands,
#   not action refs, so Dependabot cannot see them.
# - The Rust toolchain pin (@1.96.0 in ci.yml/release.yml + rust-toolchain.toml):
#   excluded below for trybuild-snapshot determinism reasons (see ignore block).
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # The Rust toolchain is pinned for trybuild-snapshot determinism and bumped
      # by hand via the documented procedure (rust-toolchain.toml → refresh the
      # .stderr snapshots → match the ci.yml/release.yml pins). It is never a
      # one-click action bump. Worse, dtolnay/rust-toolchain publishes
      # forward-dated placeholder version tags, so Dependabot proposes toolchains
      # that don't exist yet (e.g. 1.100.0, which 404s at `rustup install`).
      # Same philosophy as the by-hand `cargo install <tool>` pins above.
      - dependency-name: "dtolnay/rust-toolchain"
