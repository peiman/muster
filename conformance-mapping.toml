# Conformance mapping: maps automated checks to CKSPEC requirement IDs.
# Used by `just conform` to generate the conformance report.
# Format agreed between ckeletin-go and ckeletin-rust architects.

spec_version = "0.8.0"

# ═══════════════════════════════════════════════════════════════
# Architecture (CKSPEC-ARCH-001 through CKSPEC-ARCH-007)
# ═══════════════════════════════════════════════════════════════

[requirements.CKSPEC-ARCH-001]
title = "Four-layer architecture"
status = "met"
enforcement_level = "compile-time"
evidence = "Cargo workspace members: crates/domain, crates/infrastructure, crates/cli, plus framework crates .ckeletin/crate and .ckeletin/conform"
checks = ["cargo check --workspace"]
violation_tests = []
violation_evidence = "Structural: crates/domain/Cargo.toml has no dep on infrastructure/cli. crates/infrastructure/Cargo.toml has no dep on domain/cli. Import violations tested via trybuild: crates/domain/tests/violations/domain_imports_infrastructure.rs"

[requirements.CKSPEC-ARCH-002]
title = "Directed dependencies"
status = "met"
enforcement_level = "compile-time"
evidence = "Domain Cargo.toml has no infrastructure/cli deps. Infra has no domain/cli deps."
checks = ["cargo check --workspace"]
violation_tests = ["crates/domain/tests/violations/domain_imports_infrastructure.rs"]

[requirements.CKSPEC-ARCH-003]
title = "CLI framework isolation"
status = "met"
enforcement_level = "compile-time"
evidence = "Only crates/cli/Cargo.toml lists clap. Domain and infrastructure cannot import it."
checks = ["cargo check --workspace"]
violation_tests = [
    "crates/domain/tests/violations/domain_imports_clap.rs",
    "crates/infrastructure/tests/violations/infra_imports_clap.rs",
]

[requirements.CKSPEC-ARCH-004]
title = "Business logic isolation"
status = "met"
enforcement_level = "compile-time"
evidence = "Domain crate depends only on serde. No cross-domain, infra, or framework imports."
checks = ["cargo check --workspace"]
violation_tests = [
    "crates/domain/tests/violations/domain_imports_figment.rs",
    "crates/domain/tests/violations/domain_imports_tracing.rs",
]
notes = "ARCH-004 at module level ('business logic packages MUST NOT import each other') is enforced at design level within the single domain crate — Rust cannot cheaply compile-time-enforce intra-crate module boundaries. The multi-crate split (domain/infrastructure/cli) is the documented upgrade path when domain grows. The compile-time claim applies to the cross-crate boundary (domain cannot import infrastructure/cli), which IS enforced at compile-time. Routed to spec feedback for requirement calibration (Wave 4)."

[requirements.CKSPEC-ARCH-005]
title = "Infrastructure independence"
status = "met"
enforcement_level = "compile-time"
evidence = "Infrastructure Cargo.toml has no domain or cli dependency."
checks = ["cargo check --workspace"]
violation_tests = ["crates/infrastructure/tests/violations/infra_imports_domain.rs"]

[requirements.CKSPEC-ARCH-006]
title = "Entry point minimality"
status = "met"
enforcement_level = "design"
evidence = "crates/cli/src/main.rs is the bootstrap entry — arg parsing, config loading, logging init, and dispatch. Feature logic lives in domain; the entry contains no business logic."
checks = []
violation_tests = []
violation_evidence = "Structural: only crates/cli/Cargo.toml has [[bin]] target. Domain and infrastructure crates are library-only. Entry-point minimality is a structural/design property — the compiler enforces that only cli has a bin target, but cannot enforce that main.rs stays minimal (that's a code-review / coverage judgment). Hence enforcement_level=design, not compile-time."

[requirements.CKSPEC-ARCH-007]
title = "Package location enforcement"
status = "met"
enforcement_level = "design"
evidence = "All source lives in designated crate directories; no source files at the workspace root. Enforced structurally by the Cargo workspace layout (a stray root .rs file belongs to no crate and is not built) rather than by a dedicated file-placement linter — hence enforcement_level=design, not compile-time."
checks = ["cargo check --workspace"]
violation_tests = []
violation_evidence = "Structural: crates/cli/Cargo.toml has the only [[bin]] target. crates/domain and crates/infrastructure are library-only. No source files at workspace root."

# ═══════════════════════════════════════════════════════════════
# Enforcement (CKSPEC-ENF-001 through CKSPEC-ENF-007)
# ═══════════════════════════════════════════════════════════════

[requirements.CKSPEC-ENF-001]
title = "Automated enforcement required"
status = "met"
enforcement_level = "ci"
evidence = "lefthook pre-commit (fmt, clippy), cargo-deny, CI via just check"
checks = []
violation_tests = []
violation_evidence = "lefthook.yml pre-commit hooks (fmt, clippy, conventional commits) and .github/workflows/ci.yml gating `just check` are tooling that wraps the codebase from outside; a violating commit is rejected pre-commit or fails CI."

[requirements.CKSPEC-ENF-002]
title = "Enforcement ladder"
status = "met"
enforcement_level = "design"
evidence = "6 compile-time, 5 pre-commit/CI, 3 honor-system. See enforcement audit table."
checks = []
violation_tests = []
violation_evidence = "Analysis: the ladder (compile-time > linter > script > CI > honor) is realized across the repo and documented in CONFORMANCE.md's enforcement audit table (which mechanism enforces which rule). Whether the strongest feasible mechanism was chosen per rule is a design judgment, not a runtime check. Artifact: CONFORMANCE.md 'Enforcement Audit Table'."

[requirements.CKSPEC-ENF-003]
title = "Document enforcement gaps"
status = "met"
enforcement_level = "design"
evidence = "CONFORMANCE.md enforcement audit table documents all gaps."
checks = []
violation_tests = []
violation_evidence = "Analysis: CONFORMANCE.md's audit table + the documented ENF-007 feedback signals enumerate every honor-system/partial gap and why. Whether a gap was *omitted* cannot be machine-checked (you'd need to know the gap exists), so completeness is review-verified. Artifact: CONFORMANCE.md."

[requirements.CKSPEC-ENF-004]
title = "Enforcement audit table"
status = "met"
enforcement_level = "design"
evidence = "CONFORMANCE.md contains enforcement audit table."
checks = []
violation_tests = []
violation_evidence = "Analysis: CONFORMANCE.md maintains the living audit table (decision -> mechanism -> level -> status -> gap), reconciled with conformance-mapping.toml. Table completeness is a review judgment no check can make. Artifact: CONFORMANCE.md 'Enforcement Audit Table' section."

[requirements.CKSPEC-ENF-005]
title = "Conformance mapping completeness"
status = "met"
enforcement_level = "script"
evidence = "The conformance generator (.ckeletin/conform/src/main.rs, run by `just conform`) is hermetic by default: it reads ONLY the committed conformance/requirements.json snapshot (no network, no file writes). `--refresh` (`just conform-refresh`) fetches the latest spec from upstream and rewrites the snapshot for deliberate, reviewed reconciliation. The generator exits non-zero on any unmapped requirement AND on any mapping entry whose ID is not in the spec (stale/invented IDs inflate totals). Both directions are checked before reporting."
checks = []
violation_tests = []
violation_evidence = "Unit tests find_unmapped_flags_a_requirement_missing_from_the_mapping and find_extra_flags_a_mapping_entry_not_in_the_spec in .ckeletin/conform/src/main.rs prove both completeness directions; conform exits non-zero (CI conform job)."

[requirements.CKSPEC-ENF-006]
title = "Violation tests for enforcement claims"
status = "met"
enforcement_level = "script"
evidence = "7 trybuild violation tests back the compile-time claims. `just conform` verifies each declared violation_test file exists and emits an ENF-007 feedback signal for any above-honor-system claim lacking a violation test or violation_evidence. Dangling anchor validation also verifies that evidence file paths and symbol names cited in the mapping actually exist."
checks = ["cargo test --workspace"]
violation_tests = []
violation_evidence = "Unit tests lacks_proof_* and dangling_anchor_* in .ckeletin/conform/src/main.rs prove the proof-detection logic flags above-honor-system claims lacking a violation test or evidence, and that dangling file anchors are caught."

[requirements.CKSPEC-ENF-007]
title = "Automatic feedback signals"
status = "met"
enforcement_level = "script"
evidence = "`just conform` (.ckeletin/conform/src/main.rs) emits feedback signals for missing violation tests and above-honor-system claims lacking proof; surfaced in the report summary (feedback_signals)."
checks = []
violation_tests = []
violation_evidence = "The feedback vector and ENF-007 summary in .ckeletin/conform/src/main.rs produce the signals; the CI conform job surfaces them on every run."

[requirements.CKSPEC-ENF-008]
title = "Anchored conformance evidence"
status = "met"
enforcement_level = "script"
evidence = "`just conform` FAILS (exit non-zero) on any `met` requirement that has neither an automated check / violation test NOR written violation_evidence — an unanchored `met` cannot pass the gate."
checks = ["cargo test -p ckeletin-conform"]
violation_tests = []
violation_evidence = "Unit tests anchored_met_passes / unanchored_met_is_rejected in .ckeletin/conform/src/main.rs prove an unanchored `met` is flagged; the anchoring gate runs in the CI conform job."

[requirements.CKSPEC-ENF-009]
title = "Conformance gate on release"
status = "met"
enforcement_level = "ci"
evidence = "The tag-triggered release workflow (.github/workflows/release.yml) gates its publish step on the conform job (`needs: conform`), so no release proceeds while conformance fails. A tag-version reconciliation step asserts the pushed tag (vX.Y.Z) equals the cli package CARGO_PKG_VERSION — preventing the historical incident where v0.2.0 was cut from package version 0.1.0. A scheduled spec-drift job continuously checks the live spec_version against the vendored one and opens an issue when upstream advances."
checks = []
violation_tests = []
violation_evidence = ".github/workflows/release.yml gates release on the conform job; the tag-version step fails the release when the tag and package version disagree; .github/workflows/ci.yml runs `just conform`; the spec-drift detector job surfaces upstream advances so drift is caught between releases."

[requirements.CKSPEC-ENF-010]
title = "Published machine-readable conformance report"
status = "met"
enforcement_level = "script"
evidence = "A deterministic conformance-report.json (sorted keys, no timestamp) is published at the repo root, projected from conformance-mapping.toml. `just conform` regenerates it in-memory and FAILS if the committed report drifted from the mapping (sync-check). The spec repo aggregates this report instead of hand-authoring."
checks = ["cargo test -p ckeletin-conform"]
violation_tests = []
violation_evidence = "Unit tests report_projection_is_deterministic / sync_check_detects_drift in .ckeletin/conform/src/main.rs prove the report is a stable projection and that drift fails the gate; conformance-report.json is the published artifact."

# ═══════════════════════════════════════════════════════════════
# Testing (CKSPEC-TEST-001 through CKSPEC-TEST-004)
# ═══════════════════════════════════════════════════════════════

[requirements.CKSPEC-TEST-001]
title = "Test-driven development"
status = "met"
enforcement_level = "honor-system"
evidence = "TDD enforced via AGENTS.md and CLAUDE.md. Cannot automate intent."
checks = []
violation_tests = []
violation_evidence = "Analysis: TDD is an intent no check can verify post-hoc (a test written after code is indistinguishable from one written before). Mandated in AGENTS.md + CLAUDE.md; git history shows tests committed atomically with implementation. Artifact: AGENTS.md 'Testing'/'Workflow' + git history."

[requirements.CKSPEC-TEST-002]
title = "Minimum coverage threshold"
status = "met"
enforcement_level = "ci"
evidence = "`just coverage` enforces 85% line coverage via cargo-llvm-cov, gated by the CI coverage job (.github/workflows/ci.yml). The build-time conformance generator (.ckeletin/conform) is an excluded, documented denominator; the rest of the workspace is ~99.8%."
checks = []
violation_tests = []
violation_evidence = "`--fail-under-lines 85` in the `just coverage` recipe is a documented cargo-llvm-cov gate that exits non-zero below threshold (tooling-enforced); run by the CI coverage job, so a drop below 85% fails the build."

[requirements.CKSPEC-TEST-003]
title = "Dependency injection over mocking"
status = "met"
enforcement_level = "design"
evidence = "Writer injection in Output. No mock frameworks in Cargo.lock."
checks = ["! grep -qiE '(mockall|mockito|wiremock|double)' Cargo.lock"]
violation_tests = []
violation_evidence = "The check fails if a mock-framework crate enters Cargo.lock; the writer-injection pattern (Output takes &mut dyn Write) is the DI mechanism in .ckeletin/crate/src/output.rs."

[requirements.CKSPEC-TEST-004]
title = "Atomic test commits"
status = "met"
enforcement_level = "honor-system"
evidence = "Enforced via AGENTS.md and CLAUDE.md. Cannot automate grouping."
checks = []
violation_tests = []
violation_evidence = "Analysis: test+impl commit grouping is an intent no check can verify after the fact. Mandated in AGENTS.md + CLAUDE.md; git history shows atomic test+implementation commits. Artifact: AGENTS.md + git history."

# ═══════════════════════════════════════════════════════════════
# Output (CKSPEC-OUT-001 through CKSPEC-OUT-005)
# ═══════════════════════════════════════════════════════════════

[requirements.CKSPEC-OUT-001]
title = "Three-stream output separation"
status = "met"
enforcement_level = "script"
evidence = "output.rs: stdout (data), stderr (tracing status), log file (tracing audit)."
checks = ["cargo test -p ckeletin --lib output"]
violation_tests = []
violation_evidence = ".ckeletin/crate/src/output.rs unit tests assert stream routing (human→writer, json→envelope on stdout, error→stderr); a routing regression fails them in CI (`just check`)."

[requirements.CKSPEC-OUT-002]
title = "Machine-readable output mode"
status = "met"
enforcement_level = "script"
evidence = "--output json flag. Integration tests verify the JSON envelope on stdout with clean stderr."
checks = ["cargo test -p cli --test cli"]
violation_tests = []
violation_evidence = "crates/cli/tests/cli.rs ping_json_mode_* and json_mode_error_* tests assert the JSON envelope on stdout and empty stderr; a regression fails them in CI (`just check`)."

[requirements.CKSPEC-OUT-003]
title = "Standardized output envelope"
status = "met"
enforcement_level = "script"
evidence = "Envelope struct: status, command, data, error. Unit tests verify serialization."
checks = ["cargo test -p ckeletin --lib output"]
violation_tests = []
violation_evidence = ".ckeletin/crate/src/output.rs envelope_* unit tests assert the {status, command, data, error} envelope shape and serialization; a regression fails them in CI (`just check`)."

[requirements.CKSPEC-OUT-004]
title = "Shadow logging"
status = "met"
enforcement_level = "script"
evidence = "Output::success/message/error shadow-log the rendered data (not just the command name) to the audit layer, and file audit logging is on by default (Config.log_file_enabled defaults to true; --no-audit or log_file_enabled=false opts out). Active in both human and JSON modes."
checks = ["cargo test -p ckeletin --lib output"]
violation_tests = []
violation_evidence = "Shadow-log unit tests success_shadow_logs_the_rendered_data + message_shadow_logs_the_message_text in .ckeletin/crate/src/output.rs; default-on/opt-out integration tests audit_log_written_under_config_home_by_default + no_audit_flag_disables_the_log_file in crates/cli/tests/cli.rs; content test audit_log_content_contains_output_success_event_and_data in crates/cli/tests/cli.rs"

[requirements.CKSPEC-OUT-005]
title = "Output isolation from business logic"
status = "met"
enforcement_level = "linter"
evidence = "Domain, infrastructure, and framework crates each declare `[lints.clippy] print_stdout = 'deny'` and `print_stderr = 'deny'` in their Cargo.toml. A `println!` in domain or infrastructure code fails `cargo clippy` (lint-level, not just compile-time). Verified: adding `println!(\"x\")` to domain code produces `error: use of println!` under the print_stdout lint and the compile fails. The cli crate (presentation layer) is exempt — it is the only crate authorized to write to stdout/stderr via the Output struct."
checks = ["just ckeletin-clippy"]
violation_tests = []
violation_evidence = "crates/domain/Cargo.toml, crates/infrastructure/Cargo.toml, and .ckeletin/crate/Cargo.toml each carry `[lints.clippy] print_stdout = 'deny' / print_stderr = 'deny'`. These lints run in `just ckeletin-clippy` (part of `just check`, gated by CI). A regression (adding a println! to domain) fails the lint and hence fails CI. Verified during this conformance wave: a temporary println! probe appended to domain code produced `error: use of println!` (clippy::print_stdout) and nonzero clippy exit; the probe was removed before committing."

[requirements.CKSPEC-OUT-006]
title = "Build identity in version output"
status = "met"
enforcement_level = "script"
evidence = "The `version` command and `--version` surface semver (CARGO_PKG_VERSION), source commit, build date, and a dirty flag via infrastructure::build_info::BuildInfo; each field degrades to an explicit \"unknown\" (option_env!) rather than being omitted or fabricated."
checks = ["cargo test -p cli --test cli"]
violation_tests = []
violation_evidence = "Integration test version_command_json_has_fields in crates/cli/tests/cli.rs asserts version/commit/date/dirty are all present; build_info + version.rs unit tests cover the unknown-degradation and the dirty-suffix parse."

